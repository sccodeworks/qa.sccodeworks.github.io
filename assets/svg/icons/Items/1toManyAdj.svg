<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">

<!-- One item box -->
<rect x="2.5" y="7" width="3" height="3" rx="0.6"
stroke="#364153" stroke-width="1.2"/>

<!-- Arrow from one -->
<path d="M5.5 8.5H9"
stroke="#364153" stroke-width="1.2"
stroke-linecap="round" stroke-linejoin="round"/>

<!-- Split arrows -->
<path d="M9 8.5L12 5.5"
stroke="#364153" stroke-width="1.2"
stroke-linecap="round"/>

<path d="M9 8.5L12 11.5"
stroke="#364153" stroke-width="1.2"
stroke-linecap="round"/>

<!-- Many boxes -->
<rect x="12.5" y="4" width="3" height="3" rx="0.6"
stroke="#364153" stroke-width="1.2"/>

<rect x="12.5" y="10" width="3" height="3" rx="0.6"
stroke="#364153" stroke-width="1.2"/>

</svg>